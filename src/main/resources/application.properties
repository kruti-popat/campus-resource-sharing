# Server Configuration
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/campus_resource_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# CORS Configuration (for frontend integration)
spring.web.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,file://
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Email Configuration (Gmail SMTP - for OTP verification)
# IMPORTANT: Replace with your Gmail address and App Password
# To generate an App Password: Google Account > Security > 2-Step Verification > App Passwords
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=a2eaff001@smtp-brevo.com
spring.mail.password=YOUR_EMAIL_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

mail.from=campussharing04@gmail.com

# OTP Configuration
otp.expiry.minutes=5
